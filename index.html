<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yilia Request Portal</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-active-view="landing">
    <svg class="glass-filter-defs" width="0" height="0" aria-hidden="true" focusable="false">
      <filter id="homeGlassRefraction" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.016 0.024" numOctaves="2" seed="9" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <main class="app-shell">
      <section id="landingView" class="screen landing-page" aria-labelledby="landingTitle">
        <div id="homeShaderBackground" class="home-shader-background" aria-hidden="true"></div>
        <div class="screen-inner landing-inner">
          <div class="hero-copy">
            <h1 id="landingTitle">
              <span>哈喽</span>
              <span>有什么可以帮到你～</span>
            </h1>
          </div>

          <div class="home-actions">
            <button id="requestButton" type="button" class="glass-action escaping-button">
              <span class="button-icon">
                <img src="./assets/note-stack-add.svg" alt="" />
              </span>
              <span>提需求 !</span>
            </button>
            <button id="sayHiButton" type="button" class="glass-action">
              <span class="button-icon">
                <img src="./assets/waving-hand.svg" alt="" />
              </span>
              <span>打个招呼</span>
            </button>
          </div>
        </div>
      </section>

      <section id="greetingView" class="screen greeting-page" aria-labelledby="greetingTitle" hidden>
        <div class="screen-inner greeting-inner">
          <header class="page-header">
            <button id="greetingBackHomeButton" type="button" class="round-control" aria-label="返回首页">
              <span aria-hidden="true">‹</span>
            </button>
            <div class="title-stack">
              <h1 id="greetingTitle">
                <span>收到你的招呼啦 👋</span>
                <span>祝你今天开心</span>
              </h1>
            </div>
          </header>

          <form id="greetingForm" class="quiet-form">
            <div class="field underline-field">
              <label for="greetingMessage">要留言嘛？</label>
              <input id="greetingMessage" name="greetingMessage" type="text" placeholder="说点什么" />
            </div>

            <button type="submit" class="solid-action">发送</button>
          </form>
        </div>
      </section>

      <section id="formView" class="screen form-page" aria-labelledby="formTitle" hidden>
        <div class="screen-inner form-inner">
          <header class="page-header">
            <button id="formBackHomeButton" type="button" class="round-control" aria-label="返回首页">
              <span aria-hidden="true">‹</span>
            </button>
            <div class="title-stack">
              <h1 id="formTitle">提需求</h1>
              <p>有什么指令，亚会尽快处理～</p>
            </div>
          </header>

          <form id="requestForm" class="request-form" novalidate>
            <div class="field underline-field">
              <label for="content">需求内容 *</label>
              <textarea
                id="content"
                name="content"
                rows="1"
                placeholder="要我做什么"
                required
              ></textarea>
              <p id="contentError" class="field-error" role="alert" hidden></p>
            </div>

            <div class="field underline-field">
              <label for="requesterName">您的名字</label>
              <input id="requesterName" name="requesterName" type="text" />
            </div>

            <div class="field underline-field input-with-icon">
              <label for="deadline">截止时间</label>
              <div class="input-row">
                <input id="deadline" name="deadline" type="text" />
                <img class="field-icon" src="./assets/calendar-add-on.svg" alt="" />
              </div>
            </div>

            <fieldset class="field-group priority-field">
              <legend>优先级</legend>
              <div id="priorityGroup" class="pill-group" role="group" aria-label="优先级">
                <button type="button" class="pill" data-priority="不着急" aria-pressed="false">不着急</button>
                <button type="button" class="pill" data-priority="正常" aria-pressed="false">正常</button>
                <button type="button" class="pill" data-priority="有点急" aria-pressed="false">有点急</button>
                <button type="button" class="pill urgent-pill" data-priority="十万火急！" aria-pressed="false">十万火急！</button>
              </div>
            </fieldset>

            <p id="submissionError" class="submission-error" role="alert" aria-live="assertive" hidden></p>

            <button id="submitButton" type="submit" class="solid-action">发送</button>
          </form>
        </div>
      </section>

      <section id="successView" class="screen receipt-page" aria-labelledby="receiptTitle" aria-live="polite" hidden>
        <div class="screen-inner success-inner">
          <div class="success-content">
            <header class="page-header">
              <span class="round-control status-control" aria-hidden="true">
                <img src="./assets/check.svg" alt="" />
              </span>
              <div class="title-stack">
                <h1 id="receiptTitle">已取号</h1>
                <p>小亚已经收到，会尽快查看！！</p>
              </div>
            </header>

            <article class="ticket-card" aria-label="提交信息">
              <div class="queue-number">
                <span>当前排号</span>
                <strong>23</strong>
              </div>
              <dl id="receiptList" class="receipt-list"></dl>
            </article>
          </div>

          <div class="success-actions">
            <button id="receiptBackHomeButton" type="button" class="solid-action">回到首页</button>
            <button id="createAnotherButton" type="button" class="secondary-action">再提一个需求</button>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="./script.js" defer></script>
  </body>
</html>
